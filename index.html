<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังเข้าสู่ระบบ - งานดีขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 ระบบตัวแปรสีรองรับ Dark Mode อัตโนมัติ */
        :root { --bg-color: #f4f7f6; --text-main: #007BFF; }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #121212; --text-main: #3b9aff; }
        }

        body { 
            font-family: 'Chakra Petch', sans-serif; background: var(--bg-color); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* เอฟเฟกต์โลโก้ขยายเข้า-ออก (Pulse) */
        .logo-text {
            font-size: 42px; font-weight: 700; color: var(--text-main); margin-bottom: 20px;
            animation: pulse 1.5s infinite; letter-spacing: 1px; text-shadow: 0 4px 10px rgba(0,123,255,0.2);
        }

        /* วงกลมโหลดดิ่ง (Spinner) */
        .spinner {
            border: 4px solid rgba(0, 123, 255, 0.1); width: 45px; height: 45px; 
            border-radius: 50%; border-left-color: var(--text-main); 
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .loading-text { margin-top: 20px; color: #888; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="logo-text">งานดีขอนแก่น</div>
    <div class="spinner"></div>
    <div class="loading-text">กำลังเตรียมระบบ...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // *** Config ชุดใหม่ (Jobs-fa654) เซิร์ฟเวอร์ไทย ***
        const firebaseConfig = {
            apiKey: "AIzaSyAKRjExcEtHwljxXu2Ytr9kV1lJ_JiuFhg",
            authDomain: "jobs-fa654.firebaseapp.com",
            projectId: "jobs-fa654",
            storageBucket: "jobs-fa654.firebasestorage.app",
            messagingSenderId: "459749901677",
            appId: "1:459749901677:web:0fb8949854967df4cc4664"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ตั้งเวลาหน่วง 1.2 วินาที เพื่อให้ผู้ใช้ทันเห็นโลโก้แอปสวยๆ ก่อนเปลี่ยนหน้า
        setTimeout(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    try {
                        // ดึงข้อมูลเพื่อเช็คว่าเป็น "ช่าง" หรือ "ลูกค้า"
                        const docSnap = await getDoc(doc(db, "users", user.uid));
                        if (docSnap.exists() && docSnap.data().role === 'provider') {
                            window.location.replace("dashboard.html"); // ช่างไปหน้าควบคุม
                        } else {
                            window.location.replace("services.html"); // ลูกค้าไปหน้าค้นหาบริการ
                        }
                    } catch (e) {
                        console.error("Error routing:", e);
                        window.location.replace("services.html");
                    }
                } else {
                    // ถ้าเป็นผู้ใช้ทั่วไปที่ยังไม่ล็อกอิน ให้ตรงไปดูบริการได้เลย
                    window.location.replace("services.html");
                }
            });
        }, 1200);
    </script>
</body>
</html>
